<!DOCTYPE html>
<!--
  TEMPLATE: simulator
  PURPOSE:  "Calculate X" / "Simulate Y" / "What if Z"
  PLACEHOLDERS:
    {{TITLE}}, {{SUBTITLE}}, {{SLUG}}, {{DATE}}
    {{PARAMS_JSON}} — JSON array of input parameters:
      [
        { "id": "rate", "label": "Interest rate", "unit": "%/yr", "min": 0, "max": 20, "step": 0.1, "default": 5 },
        { "id": "years", "label": "Years", "unit": "", "min": 1, "max": 50, "step": 1, "default": 10 },
        ...
      ]
    {{FORMULA_JS}} — JavaScript function body that returns { outputs: {...}, chart: { labels: [...], values: [...] } }
      Has access to a `p` object with current parameter values: e.g. p.rate, p.years
      MUST end with: return { outputs: {...}, chart: {...} };
    {{OUTPUTS_JSON}} — JSON array describing output keys to display:
      [ { "key": "fv", "label": "Future value", "format": "currency" }, { "key": "interest", "label": "Total interest", "format": "currency" } ]
      format options: number | currency | percent | months | years
    {{CHART_TITLE}}  — e.g. "Balance over time"
    {{CHART_X_LABEL}}, {{CHART_Y_LABEL}}
    {{CONTENT_EXPLAINER}} — Markdown-ish HTML explaining the formula and assumptions
    {{SOURCES_HTML}}
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}} — agent-newsroom</title>
<link rel="stylesheet" href="https://rsms.me/inter/inter.css">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  :root { --accent: #6366F1; --accent-soft: #6366F11A; }
  html { font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  body { background: #fafafa; color: #18181b; }
  @media (prefers-color-scheme: dark) {
    body { background: #0a0a0b; color: #e4e4e7; }
    .surface { background: #131316 !important; border-color: #27272a !important; }
    .muted { color: #a1a1aa !important; }
    .border-soft { border-color: #27272a !important; }
    input[type=range] { background: #27272a; }
  }
  .surface { background: #fff; border: 1px solid #e4e4e7; }
  .muted { color: #71717a; }
  .border-soft { border-color: #e4e4e7; }
  .accent { color: var(--accent); }
  .bg-accent-soft { background: var(--accent-soft); }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  input[type=range] {
    -webkit-appearance: none; appearance: none;
    width: 100%; height: 4px; background: #e4e4e7; border-radius: 999px; outline: none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 18px; height: 18px; border-radius: 999px;
    background: var(--accent); cursor: pointer;
    transition: transform .15s ease;
  }
  input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.15); }
  input[type=range]::-moz-range-thumb {
    width: 18px; height: 18px; border-radius: 999px;
    background: var(--accent); cursor: pointer; border: none;
  }
  .output-card { padding: 1.5rem; border: 1px solid #e4e4e7; border-radius: 0.75rem; background: #fff; }
  .output-value { font-size: 2.25rem; font-weight: 700; letter-spacing: -0.02em; color: var(--accent); }
  @media (prefers-color-scheme: dark) {
    .output-card { background: #131316; border-color: #27272a; }
    input[type=range] { background: #27272a; }
  }
  .fade-in { animation: fadeIn .5s ease-out both; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
</style>
</head>
<body class="min-h-screen">

<header class="border-b border-soft">
  <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
    <a href="../../" class="flex items-center gap-2 text-sm muted hover:text-current transition">
      <i data-lucide="arrow-left" class="w-4 h-4"></i> agent-newsroom
    </a>
    <div class="text-xs muted">{{SLUG}} · {{DATE}}</div>
  </div>
</header>

<section class="max-w-6xl mx-auto px-6 pt-16 pb-8 fade-in">
  <div class="inline-flex items-center gap-2 text-xs font-medium muted mb-4">
    <span class="bg-accent-soft accent px-2 py-1 rounded-md">Simulator</span>
  </div>
  <h1 class="text-4xl md:text-5xl font-bold tracking-tight mb-4">{{TITLE}}</h1>
  <p class="text-lg md:text-xl muted max-w-3xl leading-relaxed">{{SUBTITLE}}</p>
</section>

<!-- Sim area -->
<section class="max-w-6xl mx-auto px-6 mb-12">
  <div class="grid lg:grid-cols-2 gap-6">
    <!-- Inputs -->
    <div class="surface rounded-xl p-6">
      <h2 class="text-xl font-semibold mb-6 flex items-center gap-2">
        <i data-lucide="sliders-horizontal" class="w-5 h-5 accent"></i> Inputs
      </h2>
      <div id="params" class="space-y-6"></div>
      <button id="resetBtn" class="mt-6 text-xs muted hover:text-current transition flex items-center gap-1">
        <i data-lucide="rotate-ccw" class="w-3 h-3"></i> Reset to defaults
      </button>
    </div>

    <!-- Outputs + Chart -->
    <div class="space-y-6">
      <div id="outputs" class="grid grid-cols-2 gap-4"></div>
      <div class="surface rounded-xl p-6">
        <h3 class="text-sm font-medium muted mb-3">{{CHART_TITLE}}</h3>
        <div class="h-64"><canvas id="simChart"></canvas></div>
      </div>
    </div>
  </div>
</section>

<!-- Explainer -->
<section class="max-w-6xl mx-auto px-6 mb-12">
  <h2 class="text-2xl font-semibold mb-6 flex items-center gap-2">
    <i data-lucide="function-square" class="w-5 h-5 accent"></i> How the simulation works
  </h2>
  <div class="surface rounded-xl p-8 prose-content">{{CONTENT_EXPLAINER}}</div>
</section>

<!-- Sources -->
<section class="max-w-6xl mx-auto px-6 mb-12">
  <h2 class="text-2xl font-semibold mb-6 flex items-center gap-2">
    <i data-lucide="link" class="w-5 h-5 accent"></i> Sources
  </h2>
  <div class="surface rounded-xl p-8 text-sm">{{SOURCES_HTML}}</div>
</section>

<footer class="border-t border-soft mt-16 py-8">
  <div class="max-w-6xl mx-auto px-6 flex flex-wrap items-center justify-between gap-4 text-sm muted">
    <div>Generated by <a href="../../">agent-newsroom</a> on {{DATE}}</div>
    <a href="../../" class="hover:text-current transition flex items-center gap-1">
      <i data-lucide="home" class="w-4 h-4"></i> Office
    </a>
  </div>
</footer>

<style>
  .prose-content p { margin-bottom: 1em; line-height: 1.7; }
  .prose-content p:last-child { margin-bottom: 0; }
  .prose-content code { background: var(--accent-soft); color: var(--accent); padding: 2px 6px; border-radius: 4px; font-size: 0.9em; }
</style>

<script>
  lucide.createIcons();

  const params = {{PARAMS_JSON}};
  const outputDefs = {{OUTPUTS_JSON}};

  // formatters
  const formatters = {
    number: v => v.toLocaleString(undefined, { maximumFractionDigits: 2 }),
    currency: v => '$' + v.toLocaleString(undefined, { maximumFractionDigits: 2 }),
    percent: v => v.toFixed(2) + '%',
    months: v => v.toFixed(1) + ' mo',
    years: v => v.toFixed(1) + ' yr',
  };

  // build inputs
  const paramsWrap = document.getElementById('params');
  const state = {};
  params.forEach(prm => {
    state[prm.id] = prm.default;
    const row = document.createElement('div');
    row.innerHTML = `
      <div class="flex items-center justify-between mb-2">
        <label class="text-sm font-medium">${prm.label}</label>
        <div class="text-sm tabular-nums"><span id="val-${prm.id}">${prm.default}</span>${prm.unit ? ' <span class="muted">'+prm.unit+'</span>' : ''}</div>
      </div>
      <input type="range" id="${prm.id}" min="${prm.min}" max="${prm.max}" step="${prm.step}" value="${prm.default}">
    `;
    paramsWrap.appendChild(row);
    row.querySelector('input').addEventListener('input', e => {
      state[prm.id] = parseFloat(e.target.value);
      document.getElementById('val-'+prm.id).textContent = state[prm.id];
      recompute();
    });
  });

  // build output cards
  const outWrap = document.getElementById('outputs');
  outputDefs.forEach(o => {
    const card = document.createElement('div');
    card.className = 'output-card';
    card.innerHTML = `
      <div class="text-xs muted mb-2">${o.label}</div>
      <div class="output-value" id="out-${o.key}">—</div>
    `;
    outWrap.appendChild(card);
  });

  // chart
  const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const tickColor = isDark ? '#a1a1aa' : '#71717a';
  const gridColor = isDark ? '#27272a' : '#e4e4e7';
  const chart = new Chart(document.getElementById('simChart'), {
    type: 'line',
    data: { labels: [], datasets: [{ data: [], borderColor: '#6366F1', backgroundColor: 'rgba(99,102,241,0.1)', fill: true, tension: 0.35, pointRadius: 0 }] },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { title: { display: true, text: '{{CHART_X_LABEL}}', color: tickColor }, grid: { color: gridColor }, ticks: { color: tickColor } },
        y: { title: { display: true, text: '{{CHART_Y_LABEL}}', color: tickColor }, grid: { color: gridColor }, ticks: { color: tickColor }, beginAtZero: true }
      }
    }
  });

  // compute fn
  function compute(p) {
    {{FORMULA_JS}}
  }

  function recompute() {
    const result = compute(state);
    outputDefs.forEach(o => {
      const v = result.outputs[o.key];
      const fmt = formatters[o.format] || formatters.number;
      document.getElementById('out-'+o.key).textContent = (v === undefined || isNaN(v)) ? '—' : fmt(v);
    });
    chart.data.labels = result.chart.labels;
    chart.data.datasets[0].data = result.chart.values;
    chart.update('none');
  }

  document.getElementById('resetBtn').onclick = () => {
    params.forEach(prm => {
      state[prm.id] = prm.default;
      document.getElementById(prm.id).value = prm.default;
      document.getElementById('val-'+prm.id).textContent = prm.default;
    });
    recompute();
  };

  recompute();
</script>
</body>
</html>

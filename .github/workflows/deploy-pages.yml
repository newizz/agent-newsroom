name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assemble site
        run: |
          mkdir -p _site
          # Copy virtual office UI as the landing page
          cp -r office/* _site/
          # Copy published dashboards (preview/promote workflow has been removed — all dashboards are published directly)
          [ -d published ] && cp -r published _site/published || mkdir _site/published
          # Generate a simple manifest of all dashboards for the office UI to read
          echo "{" > _site/manifest.json
          echo '  "generated": "'"$(date -u +%Y-%m-%dT%H:%M:%SZ)"'",' >> _site/manifest.json
          echo '  "published": [' >> _site/manifest.json
          if [ -d published ]; then
            first=1
            for d in published/*/; do
              [ -d "$d" ] || continue
              slug=$(basename "$d")
              [ $first -eq 0 ] && echo "," >> _site/manifest.json
              printf '    {"slug": "%s", "url": "published/%s/"}' "$slug" "$slug" >> _site/manifest.json
              first=0
            done
          fi
          echo "" >> _site/manifest.json
          echo "  ]" >> _site/manifest.json
          echo "}" >> _site/manifest.json

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
